apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopping-app
  namespace: shopping
spec:
  replicas: 2

  selector:
    matchLabels:
      app: shopping-app

  template:
    metadata:
      labels:
        app: shopping-app

    spec:
      containers:
      - name: shopping-app
        image: bibekbajagain/nodejs-shopping:4

        ports:
        - containerPort: 3000

        env:
        - name: MONGO_USER
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: username

        - name: MONGO_PWD
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: password