apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopping-app
  namespace: shopping
  labels:
    app: shopping-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: shopping-app

  template:
    metadata:
      labels:
        app: shopping-app

    spec:
      containers:
        - name: shopping-app
          image: bibekbajagain/nodejs-shopping:5
          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          env:
            # Secret
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_USER

            - name: MONGO_PWD
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_PWD

            # ConfigMap
            - name: MONGO_HOST
              valueFrom:
                configMapKeyRef:
                  name: shopping-config
                  key: MONGO_HOST

            - name: MONGO_DB
              valueFrom:
                configMapKeyRef:
                  name: shopping-config
                  key: MONGO_DB

            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: shopping-config
                  key: PORT

          volumeMounts:
            - name: images-storage
              mountPath: /app/images

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

      volumes:
        - name: images-storage
          persistentVolumeClaim:
            claimName: shopping-images-pvc