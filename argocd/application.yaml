apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shopping-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/bibek009/nodejs-shopping-gitops.git
    targetRevision: main
    path: shopping

  destination:
    server: https://kubernetes.default.svc
    namespace: shopping

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true