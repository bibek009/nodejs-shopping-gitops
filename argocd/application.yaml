apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: shopping-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/username/nodejs-shopping.git
    targetRevision: main
    path: devops/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: shopping

  syncPolicy:
    automated:
      prune: true
      selfHeal: true